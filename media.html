    <style>
        /* Google Font */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-image: url("bunga.jpg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            overflow-x: hidden;
            color: #333;
        }

        /* --- SIDE NAVIGATION BAR --- */
        .sidebar {
            position: fixed;
            left: -280px; 
            top: 0;
            width: 250px;
            height: 100%;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            transition: 0.4s;
            padding: 80px 20px 20px 20px;
            box-shadow: 2px 0 15px rgba(0,0,0,0.1);
            z-index: 999;
            border-right: 1px solid rgba(255,255,255,0.3);
        }

        .sidebar.active {
            left: 0; 
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar ul li {
            margin: 20px 0;
        }

        .sidebar ul li a {
            text-decoration: none;
            color: #7c5c61;
            font-size: 18px;
            font-weight: 500;
            display: block;
            padding: 10px;
            border-radius: 10px;
            transition: 0.3s;
        }

        .sidebar ul li a:hover {
            background: rgba(124, 92, 97, 0.1);
            padding-left: 20px;
        }

        /* --- HAMBURGER BUTTON --- */
        .menu-btn {
            position: fixed;
            top: 25px;
            left: 25px;
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            z-index: 1000;
            border: 1px solid rgba(255,255,255,0.5);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .menu-btn span {
            width: 25px;
            height: 3px;
            background: #7c5c61;
            border-radius: 5px;
            transition: 0.3s;
        }

        /* --- TOP NAVIGATION BAR --- */
        .navbar {
            width: 70%;
            margin: 30px auto;
            padding: 18px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }

        .navbar a {
            text-decoration: none;
            color: #7c5c61;
            margin: 0 20px;
            font-size: 18px;
            font-weight: 500;
            transition: 0.3s;
        }

        .quote {
            text-align: center;
            margin: 40px 0 20px;
            color: #333;
            font-weight: 500;
            font-style: italic;
        }

        .profile-img-container {
            text-align: center;
            margin-bottom: 50px;
        }

        .profile-img-container img {
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 5px solid rgba(255,255,255,0.3);
        }

        /* --- INFO GRID SYSTEM --- */
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            width: 85%;
            margin: 0 auto 100px auto;
        }

        .box {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            transition: 0.4s;
        }

        .box h2 {
            color: #7c5c61;
            font-size: 24px;
            margin-top: 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .box p, .box li {
            color: #5f4b4f;
            line-height: 1.6;
            font-size: 15px;
        }

	/* IMAGE OVERLAY */

	.image-container{
   	 position:relative;
   	 width:100%;
   	 overflow:hidden;
    	border-radius:20px;
	}

	.image-container img{
 	  width:100%;
   	 display:block;
   	 border-radius:20px;
	}

	.overlay{
   	 position:absolute;
    	bottom:0;
   	 width:100%;
  	  padding:20px;

    	background:rgba(0,0,0,0.5);

    	color:white;

    	backdrop-filter:blur(5px);
	}

	.overlay h2{
    	color:white;
	}

	.overlay p{
    	color:white;
	}

        /* --- FOOTER --- */
        .footer {
            text-align: center;
            padding: 30px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            color: #5f4b4f;
            font-size: 14px;
        }

        .social-icons {
            margin-top: 15px;
        }

        .social-icons a {
            color: #7c5c61;
            margin: 0 12px;
            font-size: 24px;
            transition: 0.3s;
        }

    </style>
