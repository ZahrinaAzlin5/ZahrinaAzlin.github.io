<style>

/* Google Font */
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

body{
    margin:0;
    font-family:'Poppins', sans-serif;

    background-image:url("bunga.jpg");
    background-size:cover;
    background-position:center;
    background-attachment:fixed;

    overflow-x:hidden;
}

/* Aesthetic Navbar */

.navbar{
    width:80%;
    margin:auto;
    margin-top:30px;

    padding:18px;

    border-radius:20px;

    background:rgba(255,255,255,0.25);

    backdrop-filter:blur(10px);

    text-align:center;

    box-shadow:
    0 8px 20px rgba(0,0,0,0.1);
}

.navbar a{
    text-decoration:none;

    color:#7c5c61;

    margin:25px;

    font-size:18px;
    font-weight:500;

    transition:0.3s;
}

.navbar a:hover{
    color:#d8a7b1;
}

/* Main Title */

.title{
    text-align:center;

    font-size:70px;

    margin-top:70px;

    color:white;

    font-weight:700;

    letter-spacing:3px;

    text-shadow:
    0 5px 15px rgba(0,0,0,0.2);

    animation:fadeDown 1.5s ease;
}

/* Box Container */

.container{
    display:flex;

    justify-content:center;

    gap:35px;

    flex-wrap:wrap;

    margin-top:70px;

    margin-bottom:100px;
}

/* Aesthetic Glass Box */

.box{

    width:280px;

    padding:30px;

    border-radius:25px;

    background:rgba(255,255,255,0.25);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.4);

    box-shadow:
    0 8px 25px rgba(0,0,0,0.1);

    transition:0.4s;

    animation:fadeUp 1s ease;
}

.box:hover{

    transform:translateY(-8px);

    box-shadow:
    0 12px 30px rgba(0,0,0,0.15);
}

/* Box Title */

.box h2{

    text-align:center;

    color:#7c5c61;

    font-size:30px;

    margin-bottom:20px;
}

/* Box Text */

.box p{

    text-align:center;

    color:#5f4b4f;

    line-height:1.8;

    font-size:16px;
}

/* Footer */

.footer{

    text-align:center;

    padding:15px;

    background:rgba(255,255,255,0.2);

    backdrop-filter:blur(10px);

    color:white;

    font-size:14px;
}

/* Social Icons */

.social-icons{
    margin-top:10px;
}

.social-icons a{
    color:white;
    margin:0 10px;
    font-size:22px;
    transition:0.3s;
}

.social-icons a:hover{
    color:#7c5c61;
}


/* Animations */

@keyframes fadeUp{

from{
    opacity:0;
    transform:translateY(30px);
}

to{
    opacity:1;
    transform:translateY(0);
}

}

@keyframes fadeDown{

from{
    opacity:0;
    transform:translateY(-30px);
}

to{
    opacity:1;
    transform:translateY(0);
}

}

</style>
</head>
